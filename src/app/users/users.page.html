<ion-header translucent="true">
  <ion-toolbar  color="primary">
    <ion-buttons *ngIf="!showSearchbar" slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-segment  [(ngModel)]="selectedView" >
      <ion-segment-button value="users">
        USUARIOS
      </ion-segment-button>
      <ion-segment-button value="create">
       AGREGAR
      </ion-segment-button>
    </ion-segment>   

  </ion-toolbar>
  </ion-header>

<ion-content  class="nun_blk">

  <!--<ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="circles"
      refreshingText="Refreshing...">
    </ion-refresher-content>
  </ion-refresher>-->


  <div [ngSwitch]="selectedView">

    <div *ngSwitchCase="'users'" >

      <div *ngIf="!usuarios || usuarios.length === 0" >
        <div class="ion-text-center" color="primary" style="padding-top: 70px;" >
          <h3><ion-icon slot="icon-only" color="medium" name="location-outline" style=" font-size: 64px;text-align: center; vertical-align: middle;"></ion-icon> 
          </h3>
          <ion-text color="medium">
            <h6>Sin Usuarios</h6>
          </ion-text>
       </div>      
     </div>
     <div *ngIf=" usuarios.length > 0">    
      <ion-list style="padding-top: 0;">
        <ion-item-sliding *ngFor="let usuario of usuarios"  style="padding-top: 0;">
          <ion-item-options side="start">
            <ion-item-option color="warning" ><ion-icon slot="icon-only" name="trash-outline" (click)="eliminarUsuario(usuario.id)"></ion-icon></ion-item-option>
           
          </ion-item-options>
      
          <ion-item>
             <ion-icon slot="start" name="person-circle-sharp" color="primary"  ></ion-icon>  
            <ion-label>
              <h3 color="dark">  {{ usuario.nombre}}  {{ usuario.apellido}}  </h3>        
              <p>{{ usuario.rut }}</p>     
           </ion-label> 
          </ion-item>
      
          <ion-item-options side="end">
           
                <ion-item-option><ion-icon  color="danger" slot="icon-only" name="thumbs-down-sharp" (click)="deshabilitarUsuario(usuario.id)"></ion-icon></ion-item-option>
                <ion-item-option><ion-icon  color="success" slot="icon-only"  name="thumbs-up-sharp" (click)="habilitarUsuario(usuario.id)"></ion-icon></ion-item-option>
                
          </ion-item-options>
        </ion-item-sliding> 
        </ion-list>


     </div>



    </div>

    <div *ngSwitchCase="'create'">
        <ion-card>
          <ion-list style="padding-top: 0px;">
            <ion-item-divider color="light">
               <ion-icon  slot="start"   name="person-add"></ion-icon>
               <ion-label color='dark' style="font-weight: bold;">
                  <h2>Datos de Usuario</h2>
               </ion-label>
            </ion-item-divider>

            <ion-item class="nun_blk">
              <ion-icon  slot="start" color="primary" name="chevron-forward"></ion-icon>
              <ion-label class="nun_blk" position="stacked" color="primary" >Nombre </ion-label>
              <ion-input   [(ngModel)]="datos['nombre']"  placeholder="Ingrese Nombre " ></ion-input>  
            </ion-item>

            <ion-item class="nun_blk">
              <ion-icon  slot="start" color="primary" name="chevron-forward"></ion-icon>
              <ion-label class="nun_blk" position="stacked" color="primary" >Apellido </ion-label>
              <ion-input   [(ngModel)]="datos['apellido']"  placeholder="Ingrese Apellido"  ></ion-input>  
            </ion-item>

            <ion-item class="nun_blk">
              <ion-icon  slot="start" color="primary" name="chevron-forward"></ion-icon>
              <ion-label class="nun_blk" position="stacked" color="primary" >RUT </ion-label>
              <ion-input   [(ngModel)]="datos['rut']"  placeholder="Ingrese RUT" ></ion-input>  
            </ion-item>
            </ion-list>

            <ion-grid>

              <ion-button expand="block" fill="outline" color="success" (click)="presentAlertConfirm()" >
                 Guardar &nbsp;
                 <ion-icon name="server-outline"></ion-icon>
              </ion-button>
             
           </ion-grid>
          </ion-card>      
    </div>

    </div>



</ion-content>
